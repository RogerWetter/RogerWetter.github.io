<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>RW - Drawboard</title>
    <link rel="icon" href="../../icons/Initials.png">
    <link rel="stylesheet" href="../../style.css?v=1">
    <link rel="stylesheet" href="style.css?v=1.003">
</head>
<script src="../../themeScript.js"></script>
<script src="../../i18n.js"></script>
<body>
<main id="main-content" class="canvas-container">
    <canvas id="canvas" class="canvas-drawing" role="img" data-i18n-aria-label="drawboard.canvas"></canvas>
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" class="navbar__logo">RW</a>
            <ul class="navbar__menu"></ul>
        </div>
    </nav>
    <div id="theme-toggle-case">
        <div id="theme-toggle"></div>
        <div id="theme-icon"></div>
    </div>
    <ul class="buttons">
        <li>
            <button class="button" id="clearBtn" type="button" data-i18n-aria-label="drawboard.clear">C</button>
        </li>
        <li>
            <button class="button" id="eraserBtn" type="button" data-i18n-aria-label="drawboard.eraser"><img class="buttonImage" src="../../icons/eraser.png" alt=""></button>
        </li>
        <li>
            <input type="color" class="button" id="colorPicker" value="#ffffff" data-i18n-aria-label="drawboard.color">
        </li>
        <li>
            <input type="range" class="button" id="lineWidthPicker" value=5
                   min=1 max="20" data-i18n-aria-label="drawboard.width">
        </li>
        <li>
            <button class="button button--wide" id="saveToGalleryBtn" type="button" data-i18n="drawboard.save">In Galerie speichern</button>
        </li>
    </ul>
    <p id="drawboard-status" class="drawboard-status" aria-live="polite"></p>
</main>
<footer>
    <a href="/privacy.txt" target="_blank" data-i18n="common.privacyNotice">Privacy Notice</a>
</footer>
<script src="../../navbar.js"></script>
<script src="drawboard.js?v=1.004"></script>
</body>
</html>
