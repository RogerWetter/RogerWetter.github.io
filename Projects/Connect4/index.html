<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>RW - Connect 4!</title>
    <link rel="icon" href="../../icons/Initials.png">
    <link rel="stylesheet" href="../../style.css?v=1">
    <link rel="stylesheet" href="../style.css?v=1.1">
    <script src="script.js"></script>
</head>
<script src="../../themeScript.js"></script>
<script src="../../i18n.js"></script>
<body>

<nav class="navbar">
    <div class="navbar__container">
        <a href="/" class="navbar__logo">RW</a>
        <ul class="navbar__menu"></ul>
    </div>
</nav>
<div id="theme-toggle-case">
    <div id="theme-toggle"></div>
    <div id="theme-icon"></div>
</div>

<main id="main-content">
<div class="connect4__header">
    <h1>Connect 4!</h1>
    <div class="connect4__header__buttons">
        <button id="new_game_btn" type="button" class="button" data-i18n="connect4.newGame">New game</button>
        <button id="undo_btn" type="button" class="button" data-i18n="connect4.undo">Undo</button>
    </div>
    <output id="output" aria-live="polite" data-i18n="connect4.turnBlue">It's 🔵 Blue's turn!</output>
</div>

<div class="board"></div>
</main>

<script src="../../navbar.js"></script>
<script>
  updateConnect4Texts()
  showBoard()
</script>
</body>
<script>
  let ngbtn = document.getElementById("new_game_btn")
  let undobtn = document.getElementById("undo_btn")
  let board = document.querySelector(".board")

  board.addEventListener("click", (e) => {
    clickedBoard(e)
  })

  ngbtn.addEventListener("click", () => {
    newGame()
  })

  undobtn.addEventListener("click", () => {
    undo()
  })
</script>

<footer>
  <a href="/privacy.txt" target="_blank" data-i18n="common.privacyNotice">Privacy Notice</a>
</footer>

</html>
