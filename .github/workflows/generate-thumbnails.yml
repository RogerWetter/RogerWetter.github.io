# Auto-generates lightweight WebP previews for any image in Gallery/images/.
# Whenever a new picture is added to the gallery, this workflow creates a
# matching <name>.webp under Gallery/images/thumbs/ (max 800px wide) and
# commits it back. The gallery UI uses these previews in the grid and only
# loads the full-quality original when a visitor clicks an image.
name: Generate gallery thumbnails

on:
  push:
    branches: [main]
    paths:
      - 'Gallery/images/**'
      - '!Gallery/images/thumbs/**'
      - '.github/workflows/generate-thumbnails.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gallery-thumbnails
  cancel-in-progress: false

jobs:
  thumbnails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install image tools
        run: |
          sudo apt-get update
          # webp:        cwebp for the fast/high-quality path on photos
          # imagemagick: handles every other supported format via its delegates
          # libheif/libavif: delegates so ImageMagick can read .heic/.heif/.avif
          sudo apt-get install -y webp imagemagick libheif1 libavif-bin

      - name: Generate missing thumbnails
        id: generate
        run: |
          set -euo pipefail
          mkdir -p Gallery/images/thumbs
          created=0
          shopt -s nullglob nocaseglob

          # Resize all gallery originals to a max width of 800 px and encode
          # as WebP with quality 78 — those numbers were tuned empirically:
          # 800 px is the largest grid cell on a typical 4K display, and
          # q=78 keeps photos visually indistinguishable from the original
          # at this size while compressing ~100x relative to JPEG sources.
          # Keep these constants in sync with the values used by the
          # `Gallery submission` workflow in `scripts/gallery-submission.js`.
          MAX_WIDTH=800
          QUALITY=78

          # Cover every extension that the gallery treats as a supported
          # image (see supportedImageExtensions in Gallery/gallery.js).
          for src in \
              Gallery/images/*.jpg Gallery/images/*.jpeg \
              Gallery/images/*.png Gallery/images/*.webp \
              Gallery/images/*.gif \
              Gallery/images/*.avif \
              Gallery/images/*.heic Gallery/images/*.heif; do
            [ -f "$src" ] || continue
            name="$(basename "$src")"
            base="${name%.*}"
            ext_lc="$(echo "${name##*.}" | tr '[:upper:]' '[:lower:]')"
            out="Gallery/images/thumbs/${base}.webp"
            if [ -f "$out" ] && [ "$out" -nt "$src" ]; then
              continue
            fi
            echo "Generating $out from $src"
            case "$ext_lc" in
              jpg|jpeg|png)
                # cwebp handles JPEG/PNG natively and produces the
                # smallest files for photographic content.
                cwebp -quiet -q "$QUALITY" -resize "$MAX_WIDTH" 0 "$src" -o "$out"
                ;;
              gif)
                # ImageMagick on the first frame: gif2webp would preserve
                # animation but cannot resize, so for any GIF wider than
                # MAX_WIDTH the cap would be silently ignored. A static
                # thumbnail of the first frame is the right trade-off
                # for a photo gallery grid.
                convert "${src}[0]" -auto-orient -resize "${MAX_WIDTH}x>" -quality "$QUALITY" "$out"
                ;;
              webp|avif|heic|heif)
                # Decode via ImageMagick (uses libwebp/libavif/libheif
                # delegates) and re-encode as resized WebP. The `>` flag
                # only resizes images that are wider than MAX_WIDTH so
                # small originals are not upscaled.
                convert "$src" -auto-orient -resize "${MAX_WIDTH}x>" -quality "$QUALITY" "$out"
                ;;
              *)
                echo "Skipping unsupported extension: $src"
                continue
                ;;
            esac
            created=$((created + 1))
          done
          echo "created=$created" >> "$GITHUB_OUTPUT"

      - name: Commit thumbnails
        if: steps.generate.outputs.created != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Gallery/images/thumbs
          if git diff --cached --quiet; then
            echo "No thumbnail changes to commit."
            exit 0
          fi
          git commit -m "chore(gallery): regenerate thumbnails"
          git push
