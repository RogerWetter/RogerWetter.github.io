# Watches for issues labelled `gallery-submission` and turns them into a
# pull request that adds the attached drawing to Gallery/images/.
#
# Flow (Variant B from the task discussion):
#   1. A drawboard user clicks "submit for review" → browser opens a new
#      issue prefilled with `<!-- gallery-submission -->`, the image name
#      and label `gallery-submission`. The user drops the just-downloaded
#      PNG into the issue body.
#   2. This workflow triggers on `issues: opened|edited|labeled`.
#   3. It parses the first markdown image attachment from the body,
#      downloads it (only from trusted GitHub user-content hosts), saves
#      it under Gallery/images/<safe-name>.png, generates a WebP thumb,
#      and opens a PR referencing the issue.
#
# Safety:
#   * Only attachments hosted on GitHub user-content domains are
#     downloaded (no arbitrary URLs from issue bodies).
#   * Image size is capped at 5 MB.
#   * File names are sanitised the same way the drawboard sanitises them.
#   * The workflow only opens a PR – the repo owner still has to merge.
name: Gallery submission

on:
  issues:
    types: [opened, edited, labeled, reopened]
  # Allows the workflow to be re-run manually for a specific issue, e.g.
  # while testing or after fixing a previously rejected submission. The
  # job below uses `gh issue view` to load the issue payload when this
  # event is the trigger.
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to (re)process as a gallery submission'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # One submission at a time, keyed on the issue, so retriggers (e.g.
  # the user editing the body to attach the image) replace the in-flight
  # run instead of racing with it.
  group: gallery-submission-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  process:
    # Run when the issue carries the `gallery-submission` label, OR when
    # the body still contains the hidden submission marker the drawboard
    # injects. The marker fallback matters because GitHub silently drops
    # the `labels=` query parameter on `issues/new?...` if the label has
    # never been created in the repository — without this fallback the
    # very first submission would be skipped (the script still re-checks
    # the marker server-side, so this stays safe). `workflow_dispatch`
    # always runs so a maintainer can retry manually.
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(github.event.issue.labels.*.name, 'gallery-submission')
      || contains(github.event.issue.body, '<!-- gallery-submission -->')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load issue payload (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        id: load_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          payload="$(gh issue view "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json number,title,body,author)"
          {
            echo "number=$(echo "$payload" | jq -r '.number')"
            echo "author=$(echo "$payload" | jq -r '.author.login')"
            echo "title<<__EOF__"
            echo "$payload" | jq -r '.title'
            echo "__EOF__"
            echo "body<<__EOF__"
            echo "$payload" | jq -r '.body'
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Install webp tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Process submission
        id: process
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || steps.load_issue.outputs.number }}
          ISSUE_TITLE: ${{ github.event.issue.title || steps.load_issue.outputs.title }}
          ISSUE_BODY: ${{ github.event.issue.body || steps.load_issue.outputs.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login || steps.load_issue.outputs.author }}
        run: node .github/workflows/scripts/gallery-submission.js

      - name: Comment "needs attachment"
        if: steps.process.outputs.status == 'needs-attachment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || steps.load_issue.outputs.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login || steps.load_issue.outputs.author }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "Hi @$ISSUE_AUTHOR 👋 — I could not find an image attachment in this submission yet. Please drag and drop the PNG file your browser downloaded into the issue body and save the change. I will pick it up automatically."

      - name: Comment "rejected"
        if: steps.process.outputs.status == 'rejected'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || steps.load_issue.outputs.number }}
          REJECT_REASON: ${{ steps.process.outputs.reason }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "Sorry, this submission could not be processed automatically: $REJECT_REASON"

      - name: Create pull request
        if: steps.process.outputs.status == 'ready'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || steps.load_issue.outputs.number }}
          BRANCH_NAME: ${{ steps.process.outputs.branch }}
          IMAGE_PATH: ${{ steps.process.outputs.image_path }}
          THUMB_PATH: ${{ steps.process.outputs.thumb_path }}
          SAFE_NAME: ${{ steps.process.outputs.safe_name }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login || steps.load_issue.outputs.author }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Always create the submission branch from main with just the
          # new files on top. Re-runs of the same issue force-push to the
          # same branch so the existing PR (if any) updates in place.
          git checkout -B "$BRANCH_NAME"
          git add "$IMAGE_PATH" "$THUMB_PATH"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "feat(gallery): add submission \"$SAFE_NAME\" (closes #$ISSUE_NUMBER)"
          git push --set-upstream origin "$BRANCH_NAME" --force

          existing_pr="$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' || true)"
          if [ -n "$existing_pr" ]; then
            echo "Existing PR #$existing_pr already targets this branch; updated by force-push."
          else
            gh pr create \
              --title "Gallery submission: $SAFE_NAME" \
              --body "Automated submission from issue #$ISSUE_NUMBER by @$ISSUE_AUTHOR.

          Closes #$ISSUE_NUMBER" \
              --base main \
              --head "$BRANCH_NAME"
          fi

          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "Thanks @$ISSUE_AUTHOR! I prepared a pull request from this submission. The repository owner will review and merge it."
