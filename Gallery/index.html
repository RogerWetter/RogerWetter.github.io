<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>RW - Gallery</title>
    <link rel="icon" href="../icons/Initials.png">
    <link rel="stylesheet" href="../style.css?v=1.2">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<script src="../themeScript.js"></script>
<script src="../i18n.js"></script>
<body>
<header>
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" class="navbar__logo">RW</a>
            <ul class="navbar__menu"></ul>
        </div>
    </nav>
    <div id="theme-toggle-case">
        <div id="theme-toggle"></div>
        <div id="theme-icon"></div>
    </div>
</header>

<main id="main-content" class="gallery__page">
    <div class="gallery__actions">
        <a class="gallery__create-button" href="/Projects/drawboard/" data-i18n="gallery.create">Erstelle dein eigenes Bild</a>
        <button id="gallery-random-btn" class="gallery__random-button" type="button" data-i18n="gallery.random">Überrasch mich ✨</button>
    </div>
    <p id="gallery-status" class="gallery__status"></p>
    <ul id="gallery-grid" class="gallery__grid"></ul>
</main>

<footer>
    <a href="/privacy.txt" target="_blank" data-i18n="common.privacyNotice">Privacy Notice</a>
</footer>

<script src="../navbar.js"></script>
<script src="gallery.js?v=1.3"></script>
</body>
</html>
